<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <!-- Font import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>LuniShop</title>
</head>
<body>
    <header>
        <a href="/frontend" class="logo"><img src="src/images/luni-logo.png" alt="LuniShop"></a>
        <div class="menu-links">
            <a href="/frontend" class="menu-item">Home</a>
            <a href="#" class="menu-item">Shop</a>
            <a href="/frontend/contact.html" class="menu-item">Contact</a>
        </div>
    </header>
    <main>
        <div class="header-blocker"></div>
        <div class="contact-container">
            <h1>Skontaktuj się z nami!</h1>
            <form class="contact-form">
                <label for="userName">Imię:</label>
                <input type="text" name="userName" placeholder="Imię">
                <label for="userEmail">Email:</label>
                <input type="email" name="userEmail" placeholder="przyklad@lunishop.com">
                <label for="userContent">Wiadomość:</label>
                <textarea name="userContent" id=""></textarea>
                <button type="submit">Wyślij</button>
            </form>
        </div>
    </main>
    <footer>
        <a href="https://github.com/SebastianPagacz/LuniShop" target="_blank">Sebastian Pagacz &copy;</a>
    </footer>
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
